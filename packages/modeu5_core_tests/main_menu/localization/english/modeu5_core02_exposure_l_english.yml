l_english:
 modeu5_core02_probe.1.title: "ModeU5 CORE-02 Opening Stock Probe"
 modeu5_core02_probe.1.desc: "Reports whether the delayed game-start hook could read the vanilla wheat stockpile from FRA's capital market. This probe never initializes or mutates ModeU5 stock."
 modeu5_core02_probe.delayed.pass: "PASS - Delayed game-start probe executed"
 modeu5_core02_probe.delayed.fail: "FAIL - Delayed game-start probe did not execute"
 modeu5_core02_probe.market.pass: "PASS - FRA capital market scope resolved"
 modeu5_core02_probe.market.fail: "FAIL - FRA capital market scope did not resolve"
 modeu5_core02_probe.value.pass: "PASS - stockpile_in_market(goods:wheat) returned a value"
 modeu5_core02_probe.value.fail: "FAIL - stockpile_in_market(goods:wheat) did not return a value"
