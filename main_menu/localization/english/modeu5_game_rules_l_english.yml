l_english:
rule_modeu5_debug_configuration: "NVE: Debug Messages"
setting_modeu5_debug_off: "Off (Recommended)"
setting_modeu5_debug_off_desc: "Hide optional NVE debug messages. Important consistency errors are still reported."
setting_modeu5_debug_basic: "Basic"
setting_modeu5_debug_basic_desc: "Show useful NVE status messages, including setup checks, mod package state, stock consistency issues, and fallback use. Recommended when checking that the mod is working correctly."
setting_modeu5_debug_verbose: "Detailed"
setting_modeu5_debug_verbose_desc: "Show detailed NVE economic debug messages, including inputs, stock changes, and diagnostic values. Useful for testing or reporting issues, but may add extra log noise."
rule_modeu5_audit_configuration: "NVE: Monthly Audit"
setting_modeu5_audit_off: "Off (Recommended)"
setting_modeu5_audit_off_desc: "Do not run the heavier monthly stock check. Manual debug checks and long-term consistency checks remain available."
setting_modeu5_audit_on: "On"
setting_modeu5_audit_on_desc: "Warning : Huge performance impact. Run an additional stock consistency check every month. Useful for testing or validating a campaign, but can reduce smoothness during the monthly tick."
rule_modeu5_accounting_persistence: "NVE: Saving Mode"
setting_modeu5_accounting_minimal: "Light Save (Recommended)"
setting_modeu5_accounting_minimal_desc: "Keeps only the economic data needed for gameplay. Recommended for better performance, especially during the monthly tick."
setting_modeu5_accounting_human_relevant: "Balanced Save"
setting_modeu5_accounting_human_relevant_desc: "Keeps more economic detail for markets connected to human-played countries, while limiting saved data elsewhere. Good balance between economic tracking and game smoothness."
setting_modeu5_accounting_strict: "Complete Save"
setting_modeu5_accounting_strict_desc: "Warning : Huge performance impact. Keeps all monthly economic details for every market. Useful for testing, comparison, or mod diagnostics, but can strongly reduce smoothness during the monthly tick."
