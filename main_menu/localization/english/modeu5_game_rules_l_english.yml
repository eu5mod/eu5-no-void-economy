l_english:
 rule_modeu5_debug_configuration: "NVE : Debug Output"
 setting_modeu5_debug_off: "Off"
 setting_modeu5_debug_off_desc: "Disable optional ModeU5 diagnostic output. Mandatory consistency errors are still reported."
 setting_modeu5_debug_basic: "Basic"
 setting_modeu5_debug_basic_desc: "Report ModeU5 initialization, package state, stock consistency failures, and fallback use."
 setting_modeu5_debug_verbose: "Verbose"
 setting_modeu5_debug_verbose_desc: "Report detailed ModeU5 inputs, stock mutations, and diagnostic values. This does not enable automatic audit reconciliation."
 rule_modeu5_audit_configuration: "NVE : Audit Reconciliation"
 setting_modeu5_audit_off: "Off"
 setting_modeu5_audit_off_desc: "Do not run monthly audit reconciliation. Explicit debug events and four-year reconciliation remain available."
 setting_modeu5_audit_on: "On"
 setting_modeu5_audit_on_desc: "Run ModeU5 stock reconciliation during the monthly country pulse. This is heavier than normal runtime and intended for audit campaigns."
