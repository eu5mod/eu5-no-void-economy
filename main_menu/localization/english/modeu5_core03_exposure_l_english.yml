 modeu5_core03_probe.1.title: "ModeU5 CORE-03 Lifecycle Probe"
 modeu5_core03_probe.1.desc: "Use the scripted-run options for reproducible visible probes, or the manual-prepare options when you want to observe your own vanilla path. The scripted runs use fixed Castile, Portugal, Huelva, and Leon fixtures and never mutate stock. Scripted Scenario C auto-annexes the staged Leon subject and does not depend on vanilla subject-age or opinion rules."
 modeu5_core03_probe.2.title: "ModeU5 CORE-03 Lifecycle Probe Results"
 modeu5_core03_probe.2.desc: "Interpret these rows against the run mode and scenario rows shown first. The scripted fixtures are meant to be visible and reproducible, but release-specific lifecycle coverage still needs dedicated confirmation."
