 modeu5_core03_probe.10.title: "ModeU5 CORE-03 Probe - Scenario A"
 modeu5_core03_probe.10.desc: "Manual scenario A is armed. Reload the same baseline save before this scenario when you want strict reproducibility. Perform exactly one permanent location owner transfer, then reopen the probe hub and open the report. Expected: location hook observed, scopes valid, no duplicate location hook, no country lifecycle hook, and no delayed finalizer."
 modeu5_core03_probe.11.title: "ModeU5 CORE-03 Probe - Scenario B"
 modeu5_core03_probe.11.desc: "Manual scenario B is armed. Reload the same baseline save before this scenario when you want strict reproducibility. Release one country or create one new country through a path that permanently transfers locations, wait two days, then reopen the probe hub and open the report. Expected: location hooks observed, country lifecycle hook observed, delayed finalizer observed after the location hooks, and duplicate location hooks absent."
 modeu5_core03_probe.12.title: "ModeU5 CORE-03 Probe - Scenario C"
 modeu5_core03_probe.12.desc: "Manual scenario C is armed. Reload the same baseline save before this scenario when you want strict reproducibility. Perform one full annexation, wait two days, then reopen the probe hub and open the report. Expected: location hooks observed, scopes valid, one annexation-family hook observed, delayed finalizer observed after the location hooks, and duplicate location hooks absent."
