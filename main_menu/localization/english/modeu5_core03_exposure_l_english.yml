l_english:
 modeu5_core03_probe.1.title: "ModeU5 CORE-03 Lifecycle Probe"
 modeu5_core03_probe.1.desc: "Use the scenario-preparation options to reset markers and arm one reproducible lifecycle test. The recommended baseline is one clean Spain save reloaded before each scenario. The probe never mutates stock."
 modeu5_core03_probe.2.title: "ModeU5 CORE-03 Lifecycle Probe Results"
 modeu5_core03_probe.2.desc: "Interpret these rows against the prepared scenario row shown first. A pure location transfer is not expected to run a country finalizer."
 modeu5_core03_probe.reset: "Reset lifecycle probe markers"
 modeu5_core03_probe.prepare.location: "Prepare Spain scenario A - one permanent location transfer"
 modeu5_core03_probe.prepare.release: "Prepare Spain scenario B - one release or new-country split"
 modeu5_core03_probe.prepare.annexation: "Prepare Spain scenario C - one annexation"
 modeu5_core03_probe.report: "Open lifecycle probe report"
 modeu5_core03_probe.scenario.location: "Prepared scenario - Spain permanent location transfer"
 modeu5_core03_probe.scenario.release: "Prepared scenario - Spain release or new-country split"
 modeu5_core03_probe.scenario.annexation: "Prepared scenario - Spain annexation"
 modeu5_core03_probe.scenario.none: "Prepared scenario - none (generic report only)"
 modeu5_core03_probe.location.pass: "PASS - Location owner-change hook observed"
 modeu5_core03_probe.location.fail: "NOT OBSERVED - Location owner-change hook"
 modeu5_core03_probe.scopes.pass: "PASS - Distinct loser and winner scopes resolved"
 modeu5_core03_probe.scopes.fail: "FAIL / NOT OBSERVED - Loser and winner scopes"
 modeu5_core03_probe.duplicates.pass: "PASS - No duplicate location hook observed"
 modeu5_core03_probe.duplicates.fail: "FAIL - One location fired the owner-change hook more than once"
 modeu5_core03_probe.country.pass: "OBSERVED - Country lifecycle hook"
 modeu5_core03_probe.country.fail: "NOT OBSERVED - Country lifecycle hook"
 modeu5_core03_probe.delayed.pass: "OBSERVED - Delayed country finalizer"
 modeu5_core03_probe.delayed.fail: "NOT OBSERVED - Delayed country finalizer"
 modeu5_core03_probe.order.pass: "PASS - Delayed finalizer observed after location hooks"
 modeu5_core03_probe.order.fail: "FAIL / NOT OBSERVED - Delayed finalizer after location hooks"
 modeu5_core03_probe.finalizers.one: "OBSERVED - One delayed finalizer"
 modeu5_core03_probe.finalizers.multiple: "OBSERVED - Multiple overlapping delayed finalizers"
 modeu5_core03_probe.10.title: "ModeU5 CORE-03 Probe - Scenario A"
 modeu5_core03_probe.10.desc: "Markers were reset and Scenario A is now armed. Reload the same baseline Spain save before this scenario when you want strict reproducibility. Using Spain, perform exactly one permanent location owner transfer, then reopen the probe hub and open the report. Expected: location hook observed, scopes valid, no duplicate location hook, no country lifecycle hook, and no delayed finalizer."
 modeu5_core03_probe.11.title: "ModeU5 CORE-03 Probe - Scenario B"
 modeu5_core03_probe.11.desc: "Markers were reset and Scenario B is now armed. Reload the same baseline Spain save before this scenario when you want strict reproducibility. Using Spain, release one country or create one new country through a path that permanently transfers locations, wait two days, then reopen the probe hub and open the report. Expected: location hooks observed, country lifecycle hook observed, delayed finalizer observed after the location hooks, and duplicate location hooks absent."
 modeu5_core03_probe.12.title: "ModeU5 CORE-03 Probe - Scenario C"
 modeu5_core03_probe.12.desc: "Markers were reset and Scenario C is now armed. Reload the same baseline Spain save before this scenario when you want strict reproducibility. Using Spain, perform one full annexation, wait two days, then reopen the probe hub and open the report. Expected: location hooks observed, scopes valid, one annexation-family hook observed, delayed finalizer observed after the location hooks, and duplicate location hooks absent."
