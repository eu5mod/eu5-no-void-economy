 modeu5_core03_probe.1.desc: "Use the synthetic-run options for fast regression, or the manual-prepare options when you want to observe a real vanilla path. The synthetic runs emulate hook scopes with a fixed Spain/Portugal fixture location and never mutate stock."
 modeu5_core03_probe.2.title: "ModeU5 CORE-03 Lifecycle Probe Results"
 modeu5_core03_probe.2.desc: "Interpret these rows against the run mode and scenario rows shown first. Synthetic runs validate probe wiring only; they do not confirm real vanilla lifecycle coverage."
