l_english:
 # Mod
 no_void_economy_name: "No Void Economy"
 no_void_economy_desc: "This mod makes the economy more physical: only goods that are actually sold create income. It includes the required No Void Economy core and optional balance extensions."

 # Trade Rework (nve_general) Tab
 no_void_economy__nve_general_name: "Trade Rework"
 ## No Void Economy (nve_no_void_economy) Group
 no_void_economy__nve_general__nve_no_void_economy_name: "No Void Economy"
 no_void_economy__nve_general__nve_no_void_economy_desc: "Main NVE gameplay behavior."
 no_void_economy__nve_no_void_economy_main_name: "Only sold goods create revenue (NVE)"
 no_void_economy__nve_no_void_economy_main_desc: "Controls how broadly NVE applies its no-void-economy logic."
 no_void_economy__nve_no_void_economy_main_option_1_name: "Activate (Performance Mode)"
 no_void_economy__nve_no_void_economy_main_option_1_desc: "NVE is inactive on markets where your country is not present. Recommended for smoother gameplay."
 no_void_economy__nve_no_void_economy_main_option_2_name: "Activate (Normal Mode)"
 no_void_economy__nve_no_void_economy_main_option_2_desc: "NVE is active on every market. More complete, but heavier."
 no_void_economy__nve_no_void_economy_main_option_3_name: "Deactivated"
 no_void_economy__nve_no_void_economy_main_option_3_desc: "Disables the main NVE economic behavior where supported."
 no_void_economy__nve_decay_activate_name: "(In development) Activate Goods Decay"
 no_void_economy__nve_decay_activate_desc: "Stocks will decay 1% each month."
 ## Trade Rework (nve_general_trade_rework) Group
 no_void_economy__nve_general__nve_general_trade_rework_name: "Trade Rework"
 no_void_economy__activate_trade_cost_name: "(In development) Trade Rework"
 no_void_economy__activate_trade_cost_desc: "The trade profit will be the difference of price between two markets."
 ## Debug & Audit options (nve_general_debug) Group
 no_void_economy__nve_general__nve_general_debug_name: "Debug & Audit options"
 no_void_economy__nve_general__nve_general_debug_desc: "Options that affect monthly tick smoothness, logs, and validation checks."
 no_void_economy__nve_debug_messages_name: "Debug Messages"
 no_void_economy__nve_debug_messages_desc: "Controls optional NVE diagnostic messages. Important consistency errors are still reported even when this is off."
 no_void_economy__nve_debug_messages_option_1_name: "Off (Recommended)"
 no_void_economy__nve_debug_messages_option_1_desc: "Hide optional NVE debug messages. Recommended for normal gameplay."
 no_void_economy__nve_debug_messages_option_2_name: "Basic"
 no_void_economy__nve_debug_messages_option_2_desc: "Show useful NVE status messages, including setup checks, package state, stock consistency issues, and fallback use."
 no_void_economy__nve_debug_messages_option_3_name: "Detailed Logs - Slow"
 no_void_economy__nve_debug_messages_option_3_desc: "Warning: shows detailed economic debug messages, including inputs, stock changes, and diagnostic values. This can create heavy log output and may reduce smoothness during monthly ticks."
 no_void_economy__nve_monthly_stock_check_name: "Monthly Stock Check"
 no_void_economy__nve_monthly_stock_check_desc: "Controls whether NVE runs an additional stock consistency check every month."
 no_void_economy__nve_monthly_stock_check_option_1_name: "Off (Recommended)"
 no_void_economy__nve_monthly_stock_check_option_1_desc: "Do not run the heavier monthly stock check. Recommended for normal gameplay. Manual debug checks and long-term consistency checks remain available."
 no_void_economy__nve_monthly_stock_check_option_2_name: "On - Slower Monthly Ticks"
 no_void_economy__nve_monthly_stock_check_option_2_desc: "Warning: runs an additional stock consistency check every month. Useful for testing or validating a campaign, but it can noticeably reduce game smoothness during monthly ticks."
 no_void_economy__nve_save_mode_name: "Save mode"
 no_void_economy__nve_save_mode_desc: "Controls how much NVE economic state is kept between monthly ticks."
 no_void_economy__nve_save_mode_option_1_name: "Light Save (Recommended)"
 no_void_economy__nve_save_mode_option_1_desc: "Keeps only the economic data needed for gameplay. Recommended for better performance, especially during monthly ticks."
 no_void_economy__nve_save_mode_option_2_name: "Balanced Save"
 no_void_economy__nve_save_mode_option_2_desc: "Keeps more economic detail for markets connected to human-played countries, while limiting saved data elsewhere. Good balance between economic tracking and game smoothness."
 no_void_economy__nve_save_mode_option_3_name: "Complete Save - Slow"
 no_void_economy__nve_save_mode_option_3_desc: "Warning: keeps all monthly economic details for every market. Useful for testing, comparison, or diagnostics, but can strongly reduce smoothness during monthly ticks."

 # Balance (nve_balance) Tab
