 # Mod
 no_void_economy_name: "No Void Economy"
 no_void_economy_desc: "This mode intend to reflect the real economy; only good that are sold generate an income. This a mod in which only goods that are sold generate income to Estates & Country, thus reflecting the real economy. It is composed of a required module that remove the Void Economy as well as \"Optional\" extension."

