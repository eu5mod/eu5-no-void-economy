 no_void_economy__nve_balance_difficulty_desc: "Set a difficulty level."
 no_void_economy__nve_balance_difficulty_option_1_name: "Hard (Historical, you may lose wars)"
 no_void_economy__nve_balance_difficulty_option_2_name: "Normal (Gameful, you might blob)"
