l_english:
 modeu5_debug.1.title: "ModeU5 Stock Tests"
 modeu5_debug.1.desc: "Run deterministic stock tests. Results are stored as modeu5_test_* variables; the latest transaction and record read are stored in ModeU5 debug variables."
 modeu5_debug.1.a: "Test add, remove, and decay"
 modeu5_debug.1.b: "Test same-market transfers"
 modeu5_debug.1.c: "Test inter-market transfer"
 modeu5_debug.1.d: "Test rebuild and consistency validation"
 modeu5_debug.1.e: "Test US-11 dirty-record reconciliation"
 modeu5_debug.1.f: "Test CORE-02 opening allocation"
 modeu5_debug.2.title: "ModeU5 CORE/US Test Results"
 modeu5_debug.2.desc: "Only the tests already run in this country have meaningful results. A failed result is also written to error.log."
 modeu5_us01_debug.1.title: "ModeU5 US-01 Tests"
 modeu5_us01_debug.1.desc: "Run focused ModeU5 US-01 stock-dimension tests."
 modeu5_us01_debug.1.a: "Run US-01 stock-dimension test"
 modeu5_us01_debug.2.title: "ModeU5 US-01 Test Results"
 modeu5_us01_debug.2.desc: "Only the tests already run in this country have meaningful results. A failed result is also written to error.log."
 modeu5_us02_debug.1.title: "ModeU5 US-02 Tests"
 modeu5_us02_debug.1.desc: "Run focused ModeU5 US-02 storage-capacity tests. The marketplace timing probe adds 10 marketplace levels to FRA's capital and should only be used in a disposable test save."
 modeu5_us02_debug.1.a: "Run US-02 storage-capacity test"
 modeu5_us02_debug.1.b: "Probe +10 marketplaces - step 1"
 modeu5_us02_debug.1.c: "Probe +10 marketplaces - step 2 after monthly tick"
 modeu5_us02_debug.2.title: "ModeU5 US-02 Test Results"
 modeu5_us02_debug.2.desc: "Only the tests already run in this country have meaningful results. A failed result is also written to error.log.\n\nFRA capital market wheat dump:\nStock: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_stock').GetValue|2]#!\nCapacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_capacity').GetValue|2]#!\nAvailable capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_available').GetValue|2]#!\nOver-capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_over_cap').GetValue|2]#!\nTrade-capacity contribution: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_trade_capacity').GetValue|2]#!\nLocation-rank contribution: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_location_rank_capacity').GetValue|2]#!\nOwned locations in market: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_location_count').GetValue|0]#!\nIron wrapper capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_iron_capacity').GetValue|2]#!"
 modeu5_us02_debug.3.title: "ModeU5 US-02 Capacity Timing Probe"
 modeu5_us02_debug.3.desc: "This probe adds 10 marketplace levels to FRA's capital, recalculates wheat capacity immediately for the destructive setup step, then reads persisted wheat capacity after a monthly tick to verify the automatic monthly refresh.\n\nStorage capacity:\nBefore: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_before_capacity').GetValue|2]#!\nAfter building: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_build_capacity').GetValue|2]#!\nAfter monthly tick: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_month_capacity').GetValue|2]#!\nImmediate delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_immediate_capacity').GetValue|2]#!\nMonthly delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_month_capacity').GetValue|2]#!\n\nTrade-capacity component:\nBefore: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_before_trade').GetValue|2]#!\nAfter building: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_build_trade').GetValue|2]#!\nAfter monthly tick: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_month_trade').GetValue|2]#!\nImmediate delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_immediate_trade').GetValue|2]#!\nMonthly delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_month_trade').GetValue|2]#!"
 modeu5_core03_debug.1.title: "ModeU5 CORE-03 Stock Succession Test"
 modeu5_core03_debug.1.desc: "Run a destructive end-to-end test in a disposable Castile baseline save. The test seeds 100 wheat into Castile in Cadiz's market, transfers Cadiz to Portugal, waits one day, and verifies that the country stocks move while the market aggregate stays unchanged."
 modeu5_core03_debug.1.a: "Run CORE-03 Cadiz stock-survival test"
 modeu5_core03_debug.2.title: "ModeU5 CORE-03 Stock Succession Result"
 modeu5_core03_debug.2.desc: "Cadiz to Portugal wheat succession dump:\nCAS before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_cas_before').GetValue|2]#!\nCAS after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_cas_after').GetValue|2]#!\nPOR before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_por_before').GetValue|2]#!\nPOR after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_por_after').GetValue|2]#!\nLoser capacity before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_loser_capacity').GetValue|2]#!\nCadiz capacity contribution: #Y [THIS.GetVariable('modeu5_debug_core03_ui_location_capacity').GetValue|2]#!\nExpected transfer: #Y [THIS.GetVariable('modeu5_debug_core03_ui_expected_transfer').GetValue|2]#!\nActual transfer: #Y [THIS.GetVariable('modeu5_debug_core03_ui_actual_transfer').GetValue|2]#!\nMarket before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_before').GetValue|2]#!\nMarket after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_after').GetValue|2]#!\nMarket delta: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_delta').GetValue|2]#!"
 modeu5_us00_debug.1.title: "ModeU5 US-00 Void-Economy Tests"
 modeu5_us00_debug.1.desc: "Run focused ModeU5 US-00 ledger, overproduction, void-wealth, and production-penalty tests. PROBE-021 checks location output exposure and must pass before live monthly production ingestion is wired."
 modeu5_us00_debug.1.a: "Run US-00 controlled pipeline test"
 modeu5_us00_debug.1.b: "Run PROBE-021 location output probe"
 modeu5_us00_debug.2.title: "ModeU5 US-00 Test Result"
 modeu5_us00_debug.2.desc: "US-00 controlled pipeline dump:\nProduced: #Y [THIS.GetVariable('modeu5_us00_ui_produced').GetValue|2]#!\nAdded: #Y [THIS.GetVariable('modeu5_us00_ui_added').GetValue|2]#!\nRejected: #Y [THIS.GetVariable('modeu5_us00_ui_rejected').GetValue|2]#!\nOverproduction ratio: #Y [THIS.GetVariable('modeu5_us00_ui_ratio').GetValue|4]#!\nEffective ratio: #Y [THIS.GetVariable('modeu5_us00_ui_effective_ratio').GetValue|4]#!\nVoid wealth: #Y [THIS.GetVariable('modeu5_us00_ui_void_wealth').GetValue|2]#!\nTaxable proxy: #Y [THIS.GetVariable('modeu5_us00_ui_taxable_proxy').GetValue|2]#!\nNext-cycle penalty: #Y [THIS.GetVariable('modeu5_us00_ui_penalty').GetValue|4]#!\nMarket void wealth: #Y [THIS.GetVariable('modeu5_us00_ui_market_void_wealth').GetValue|2]#!\nTotal void wealth: #Y [THIS.GetVariable('modeu5_us00_ui_total_void_wealth').GetValue|2]#!\nStock after: #Y [THIS.GetVariable('modeu5_us00_ui_stock_after').GetValue|2]#!\nCapacity: #Y [THIS.GetVariable('modeu5_us00_ui_capacity').GetValue|2]#!\nMarket stock after: #Y [THIS.GetVariable('modeu5_us00_ui_market_stock_after').GetValue|2]#!\n\nPROBE-021 dump:\nOwned locations scanned: #Y [THIS.GetVariable('modeu5_us00_ui_probe_location_count').GetValue|0]#!\nPositive wheat-output locations: #Y [THIS.GetVariable('modeu5_us00_ui_probe_positive_goods_output_count').GetValue|0]#!\nWheat goods_output total: #Y [THIS.GetVariable('modeu5_us00_ui_probe_wheat_goods_output_total').GetValue|4]#!\nRaw-material output total: #Y [THIS.GetVariable('modeu5_us00_ui_probe_raw_material_output_total').GetValue|4]#!"
 modeu5_perf02_debug.1.title: "ModeU5 PERF-02 Native Market Iterator Probe"
 modeu5_perf02_debug.1.desc: "Probe the current country with the native country-to-market iterator. The probe builds a relevant-market list through every_market_present_in_country and verifies that markets of owned locations are not missing from that list."
 modeu5_perf02_debug.1.a: "Run native market iterator probe"
 modeu5_perf02_debug.2.title: "ModeU5 PERF-02 Probe Result"
 modeu5_perf02_debug.2.desc: "Native market iterator dump:\nCountry scopes scanned: #Y [THIS.GetVariable('modeu5_perf02_ui_human_country_count').GetValue|0]#!\nNative market iterations: #Y [THIS.GetVariable('modeu5_perf02_ui_native_iterations').GetValue|0]#!\nRelevant markets added: #Y [THIS.GetVariable('modeu5_perf02_ui_relevant_markets').GetValue|0]#!\nOwned-location markets: #Y [THIS.GetVariable('modeu5_perf02_ui_owned_location_markets').GetValue|0]#!\nOwned-location markets missing from native list: #Y [THIS.GetVariable('modeu5_perf02_ui_missing_owned_location_markets').GetValue|0]#!"
