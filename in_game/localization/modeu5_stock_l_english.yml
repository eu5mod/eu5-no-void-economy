_penalty').GetValue|4]#!\nAffected locations: #Y [THIS.GetVariable('modeu5_us00_ui_runtime_affected_locations').GetValue|0]#!\nPositive locations: #Y [THIS.GetVariable('modeu5_us00_ui_runtime_positive_locations').GetValue|0]#!\nGood price: #Y [THIS.GetVariable('modeu5_us00_ui_runtime_good_price').GetValue|4]#!\nModifier mode: #Y [THIS.GetVariable('modeu5_us00_ui_runtime_modifier_mode').GetValue|0]#!"
