 modeu5_us02_debug.1.title: "ModeU5 US-02 Tests"
 modeu5_us02_debug.1.desc: "Run focused ModeU5 US-02 storage-capacity tests. The marketplace timing probe adds 10 marketplace levels to FRA's capital and should only be used in a disposable test save."
 modeu5_us02_debug.1.a: "Run US-02 storage-capacity test"
 modeu5_us02_debug.1.b: "Probe +10 marketplaces - step 1"
 modeu5_us02_debug.1.c: "Probe +10 marketplaces - step 2 after monthly tick"
 modeu5_us02_debug.2.title: "ModeU5 US-02 Test Results"
 modeu5_us02_debug.2.desc: "Only the tests already run in this country have meaningful results. A failed result is also written to error.log.\n\nFRA capital market wheat dump:\nStock: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_stock').GetValue|2]#!\nCapacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_capacity').GetValue|2]#!\nAvailable capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_available').GetValue|2]#!\nOver-capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_over_cap').GetValue|2]#!\nMarket trade-capacity contribution: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_trade_capacity').GetValue|2]#!\nLocation-pool share: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_location_rank_capacity').GetValue|2]#!\nCountry locations in pool: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_location_count').GetValue|0]#!\nMarkets sharing location pool: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_market_count').GetValue|0]#!\nCountry location pool total: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_wheat_country_pool_total').GetValue|2]#!\nIron wrapper capacity: #Y [THIS.GetVariable('modeu5_debug_us02_ui_fra_iron_capacity').GetValue|2]#!"
 modeu5_us02_debug.3.title: "ModeU5 US-02 Capacity Timing Probe"
 modeu5_us02_debug.3.desc: "This probe adds 10 marketplace levels to FRA's capital, recalculates wheat capacity immediately for the destructive setup step, then reads persisted wheat capacity after a monthly tick to verify the automatic monthly refresh.\n\nStorage capacity:\nBefore: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_before_capacity').GetValue|2]#!\nAfter building: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_build_capacity').GetValue|2]#!\nAfter monthly tick: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_month_capacity').GetValue|2]#!\nImmediate delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_immediate_capacity').GetValue|2]#!\nMonthly delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_month_capacity').GetValue|2]#!\n\nTrade-capacity component:\nBefore: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_before_trade').GetValue|2]#!\nAfter building: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_build_trade').GetValue|2]#!\nAfter monthly tick: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_after_month_trade').GetValue|2]#!\nImmediate delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_immediate_trade').GetValue|2]#!\nMonthly delta: #Y [THIS.GetVariable('modeu5_debug_us02_ui_probe_delta_month_trade').GetValue|2]#!"
 modeu5_core03_debug.1.title: "ModeU5 CORE-03 Stock Succession Test"
 modeu5_core03_debug.1.desc: "Run a destructive end-to-end test in a disposable Castile baseline save. The test seeds 100 wheat into Castile in Cadiz's market, transfers Cadiz to Portugal, waits one day, and verifies that the country stocks move while the market aggregate stays unchanged."
 modeu5_core03_debug.1.a: "Run CORE-03 Cadiz stock-survival test"
 modeu5_core03_debug.2.title: "ModeU5 CORE-03 Stock Succession Result"
 modeu5_core03_debug.2.desc: "Cadiz to Portugal wheat succession dump:\nCAS before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_cas_before').GetValue|2]#!\nCAS after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_cas_after').GetValue|2]#!\nPOR before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_por_before').GetValue|2]#!\nPOR after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_por_after').GetValue|2]#!\nLoser capacity before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_loser_capacity').GetValue|2]#!\nCadiz capacity contribution: #Y [THIS.GetVariable('modeu5_debug_core03_ui_location_capacity').GetValue|2]#!\nExpected transfer: #Y [THIS.GetVariable('modeu5_debug_core03_ui_expected_transfer').GetValue|2]#!\nActual transfer: #Y [THIS.GetVariable('modeu5_debug_core03_ui_actual_transfer').GetValue|2]#!\nMarket before: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_before').GetValue|2]#!\nMarket after: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_after').GetValue|2]#!\nMarket delta: #Y [THIS.GetVariable('modeu5_debug_core03_ui_market_delta').GetValue|2]#!"
