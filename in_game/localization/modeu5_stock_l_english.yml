 modeu5_revalidate_debug.1.desc: "Run the main deterministic ModeU5 validation chain with delayed steps. The chain logs each scenario as ModeU5 TEST ENTERED/PASS/FAIL/BLOCKED so tools/summarize_modeu5_test_logs.sh can produce a compact review summary."
 modeu5_revalidate_debug.1.a: "Revalidate main operations"
 modeu5_revalidate_debug.99.title: "ModeU5 Main Revalidation Result"
 modeu5_revalidate_debug.99.desc: "The revalidation chain finished. The detailed source of truth is debug.log. Run tools/summarize_modeu5_test_logs.sh after closing EU5 to get entered/pass/fail/blocked counts and the exact scenario lines."
 modeu5_revalidate_debug.result.pass: "PASS - Main operations revalidated"
 modeu5_revalidate_debug.result.blocked: "BLOCKED - Main revalidation had blocked prerequisites"
