name: Generated Files

on:
  push:
  pull_request:

jobs:
  validate-generated-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate local artifacts
        run: ./tools/generate_all.sh

      - name: Validate package structure and generated adapters
        run: |
          set +e
          /bin/bash ./tools/validate_module_packages.sh > validate_module_packages.log 2>&1
          status=$?
          cat validate_module_packages.log
          exit $status

      - name: Upload package validator log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-module-packages-log
          path: validate_module_packages.log

      - name: Audit persistent state surface
        run: /bin/bash ./tools/audit_modeu5_persistent_state.sh

      - name: Validate CMM value-link quoting
        run: /bin/bash ./tools/normalize_cmm_value_links.sh --check

      - name: Validate CMM configuration surface
        run: python3 ./tools/validate_cmm_configuration.py

      - name: Ensure generated outputs stay untracked
        run: |
          tracked_generated="$(git ls-files | grep -E '(^|/)modeu5_[^/]*_generated(\.txt|_l_english\.yml)$' || true)"
          if [ -n "$tracked_generated" ]; then
            echo "Generated ModeU5 outputs must not be tracked:"
            echo "$tracked_generated"
            exit 1
          fi

      - name: Ensure generation does not dirty tracked files
        run: |
          changed="$(git status --short --untracked-files=no)"
          if [ -n "$changed" ]; then
            echo "Tracked files changed after generation:"
            echo "$changed"
            exit 1
          fi
