name: Generate README

on:
  pull_request:
    types:
      - closed
    paths:
      - README.template.md
      - .modeu5.local.env.template
      - .github/workflows/readme-generator.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-readme:
    if: (github.event.pull_request != null && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python dependencies
        run: python3 -m pip install python-dotenv

      - name: Generate README.md from template
        run: |
          python3 <<'PY'
          from decimal import Decimal
          from pathlib import Path
          import sys
          from dotenv import dotenv_values

          template_path = Path("README.template.md")
          env_path = Path(".modeu5.local.env.template")
          output_path = Path("README.md")

          def format_decimal(value: Decimal) -> str:
              text = format(value, "f")
              if "." in text:
                  text = text.rstrip("0").rstrip(".")
              return text

          def as_direct_percent(value: str) -> str:
              return f"{format_decimal(Decimal(value))}%"

          def as_ratio_percent(value: str) -> str:
              return f"{format_decimal(Decimal(value) * Decimal(100))}%"

          def as_plain_value(value: str) -> str:
              return value

          formatters = {
              "MODEU5_US09_BONUS_PERCENT": as_direct_percent,
              "MODEU5_US15_BONUS_PERCENT": as_ratio_percent,
              "MODEU5_US16_CASSUS_BELLI_VALIDITY": as_plain_value,
          }

          env_values = dotenv_values(env_path)
          missing = [variable for variable in formatters if variable not in env_values or env_values[variable] is None]

          if missing:
              print(f"Missing variables in {env_path}:")
              for variable in missing:
                  print(f" - {variable}")
              sys.exit(1)

          readme = template_path.read_text(encoding="utf-8")
          for variable, formatter in formatters.items():
              readme = readme.replace(f"<{variable}>", formatter(env_values[variable]))

          output_path.write_text(readme, encoding="utf-8")
          PY

      - name: Create pull request for generated README
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: README.md
          base: ${{ github.event.repository.default_branch }}
          branch: readme-update-${{ github.run_id }}
          commit-message: Generate README from template
          delete-branch: true
          title: Generate README from template
          body: |
            Automated README regeneration from `README.template.md` and
            `.modeu5.local.env.template`.

            This workflow opens a pull request instead of pushing directly to
            the protected default branch.
